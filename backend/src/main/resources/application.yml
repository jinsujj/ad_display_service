spring:
  application:
    name: adsignage
  datasource:
    # 환경변수로 override 가능 — 운영(컨테이너) 은 PostgreSQL 을 가리키게,
    # 로컬 개발은 H2 file 기본값 그대로. PostgreSQL 모드는 SPRING_DATASOURCE_URL,
    # SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD 를 docker compose
    # 에서 주입한다.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/adsignage;AUTO_SERVER=TRUE;MODE=PostgreSQL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # Hibernate 가 datasource URL 로부터 자동 감지하도록 명시 dialect 제거.
        # PostgreSQL 이면 PostgreSQLDialect, H2 면 H2Dialect 가 선택된다.
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # PostgreSQL 의 다른 프로젝트(owl-blog 등) 와 테이블이 섞이지 않도록
    # 별도 schema 사용. 로컬 H2 에서는 schemas 가 없어도 무시되므로 문제 없음.
    schemas: ${SPRING_FLYWAY_SCHEMAS:}
    create-schemas: true
  servlet:
    multipart:
      # Sub-AC 5: cap individual file part and the overall multipart request at
      # 500 MiB. Mirrors `adsignage.max-upload-size-bytes` (the application-level
      # cap enforced by VideoUploadService). When either limit is breached
      # Spring throws MaxUploadSizeExceededException, which GlobalExceptionHandler
      # maps to 413 Payload Too Large.
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      file-size-threshold: 0
      resolve-lazily: false

server:
  port: 8080
  forward-headers-strategy: framework

# springdoc-openapi (Swagger UI / OpenAPI 3 스펙) 노출 설정
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

adsignage:
  video-storage-path: ${VIDEO_STORAGE_PATH:/var/lib/adsignage/videos}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-is-a-very-long-secret-key-for-hs256-jwt-signing-purposes}
    expiration-ms: 86400000
  # AC 20203 Sub-AC 3 — operator-local pivot the server uses to bucket play
  # events into "today" for the daily-cap count. MUST match the timezone
  # that web/lib/dailyCount.ts treats as local on the player (the device's
  # `getFullYear/getMonth/getDate`), or POST and GET responses will disagree
  # at the midnight boundary. Default Asia/Seoul matches the demo
  # deployment at stream.owl-dev.me; override via DAILY_COUNT_ZONE_ID for
  # other regions.
  daily-count:
    zone-id: ${DAILY_COUNT_ZONE_ID:Asia/Seoul}

logging:
  level:
    org.springframework.security: INFO
    me.owldev.adsignage: DEBUG
