# =============================================================================
# AdSignage 개발/운영용 docker compose
#
# 단일 호스트(Owl-SER8 등) 에 백엔드 + 웹을 띄우고, nginx 는 호스트에 그대로
# 두는 구성이다. 컨테이너 안에서 서로를 이름(http://backend:8080,
# http://web:3000) 으로 부른다 — 호스트 nginx 는 127.0.0.1:8080 / :3000 에
# 붙은 publish 포트로 그대로 프록시 가능.
#
# 이미지 소스:
#   - 로컬 빌드:     docker compose build
#   - ghcr 이미지:   IMAGE_TAG 만 바꾸고 docker compose pull && up -d
#                    (CI 가 ghcr.io/jinsujj/adsignage-{backend,web}:<sha> 로 push)
#
# 사용 예:
#   docker compose up -d --build
#   docker compose logs -f backend
#   docker compose down
#
# 환경변수: 같은 디렉토리의 .env (없으면 .env.example 참고) 에서 자동 로드.
# =============================================================================

services:
  backend:
    # 로컬 빌드와 ghcr 이미지 pull 모두 지원.
    # docker compose build → BACKEND_IMAGE 무시하고 build 컨텍스트 사용.
    # docker compose pull  → BACKEND_IMAGE 의 image 만 pull.
    image: ${BACKEND_IMAGE:-ghcr.io/jinsujj/adsignage-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adsignage-backend
    restart: unless-stopped
    environment:
      # 기본 application.yml 이 ${JWT_SECRET} placeholder 를 쓰므로 반드시
      # 셋팅. 셋팅 안 하면 데모용 약한 키가 그대로 들어간다.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — generate with: openssl rand -hex 64}
      VIDEO_STORAGE_PATH: /var/lib/adsignage/videos
      DAILY_COUNT_ZONE_ID: ${DAILY_COUNT_ZONE_ID:-Asia/Seoul}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # H2 file URL 이 컨테이너 내 WORKDIR 기준 ./data/ 에 떨어지므로 named
      # volume 으로 영속화. 외부 PostgreSQL 로 옮길 때는 SPRING_DATASOURCE_URL
      # 등 표준 Spring 환경변수를 여기에 추가.
    volumes:
      - adsignage-data:/opt/adsignage/data
      - adsignage-videos:/var/lib/adsignage/videos
    ports:
      # 기존 systemd 가 8080 을 점유 중인 환경에서는 BACKEND_HOST_PORT 를
      # 18080 같은 다른 포트로 두고 양쪽이 공존하게 한다. 컨테이너 내부는
      # 항상 8080 — 변하지 않는다.
      - "${BACKEND_HOST_PORT:-8080}:8080"
    networks:
      - adsignage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  web:
    image: ${WEB_IMAGE:-ghcr.io/jinsujj/adsignage-web:latest}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 타임에 인라인되므로 build args 로 전달.
        # 동일 호스트에 nginx 로 합쳐 배포할 거면 빈 문자열(상대 경로) 권장.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: adsignage-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      # 마찬가지로 systemd 와 공존하려면 WEB_HOST_PORT 를 13000 같이 다른
      # 포트로. 기존 nginx 가 13000 을 가리키도록 conf 를 바꿀 때까지는 docker
      # 측은 LAN IP + 포트로 직접 접근(http://192.168.0.24:13000) 가능.
      - "${WEB_HOST_PORT:-3000}:3000"
    networks:
      - adsignage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  adsignage:
    driver: bridge

volumes:
  # H2 file: jdbc:h2:file:./data/adsignage → 컨테이너 /opt/adsignage/data
  adsignage-data:
  # MP4 업로드: VIDEO_STORAGE_PATH=/var/lib/adsignage/videos
  adsignage-videos:
