# =============================================================================
# AdSignage 개발/운영용 docker compose
#
# 단일 호스트(Owl-SER8 등) 에 백엔드 + 웹을 띄우고, nginx 는 호스트에 그대로
# 두는 구성이다. 컨테이너 안에서 서로를 이름(http://backend:8080,
# http://web:3000) 으로 부른다 — 호스트 nginx 는 127.0.0.1:8080 / :3000 에
# 붙은 publish 포트로 그대로 프록시 가능.
#
# 이미지 소스:
#   - 로컬 빌드:     docker compose build
#   - ghcr 이미지:   IMAGE_TAG 만 바꾸고 docker compose pull && up -d
#                    (CI 가 ghcr.io/jinsujj/adsignage-{backend,web}:<sha> 로 push)
#
# 사용 예:
#   docker compose up -d --build
#   docker compose logs -f backend
#   docker compose down
#
# 환경변수: 같은 디렉토리의 .env (없으면 .env.example 참고) 에서 자동 로드.
# =============================================================================

services:
  backend:
    # 로컬 빌드와 ghcr 이미지 pull 모두 지원.
    # docker compose build → BACKEND_IMAGE 무시하고 build 컨텍스트 사용.
    # docker compose pull  → BACKEND_IMAGE 의 image 만 pull.
    image: ${BACKEND_IMAGE:-ghcr.io/jinsujj/adsignage-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adsignage-backend
    restart: unless-stopped
    environment:
      # 기본 application.yml 이 ${JWT_SECRET} placeholder 를 쓰므로 반드시
      # 셋팅. 셋팅 안 하면 데모용 약한 키가 그대로 들어간다.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required — generate with openssl rand -hex 64}"
      VIDEO_STORAGE_PATH: /var/lib/adsignage/videos
      DAILY_COUNT_ZONE_ID: ${DAILY_COUNT_ZONE_ID:-Asia/Seoul}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # PostgreSQL 외부 컨테이너(owl-blog-network 의 postgres) 사용. 호스트명
      # `postgres` 는 외부 network attach 후 컨테이너 이름으로 해석된다.
      # currentSchema 로 owldev DB 안에 별도 schema 격리.
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/owldev?currentSchema=adsignage}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:?POSTGRES_USER required}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}"
      # Flyway 가 schema 를 처음 만나면 자동 생성하도록.
      SPRING_FLYWAY_SCHEMAS: adsignage
    volumes:
      # PostgreSQL 사용 후 H2 파일은 더 이상 안 쓰지만, 운영 PostgreSQL 장애
      # 시 H2 fallback 으로 잠깐 띄워볼 수 있게 named volume 은 그대로.
      - adsignage-data:/opt/adsignage/data
      - adsignage-videos:/var/lib/adsignage/videos
    ports:
      # nginx 가 8082 / 3002 로 프록시하고 있으므로 publish 포트도 거기 맞춤.
      # 다른 환경(LAN 직접 접근, CI 등) 에서는 .env 의 BACKEND_HOST_PORT 로 override.
      - "${BACKEND_HOST_PORT:-8082}:8080"
    networks:
      - adsignage
      # postgres 컨테이너가 attached 된 외부 network. .env 의
      # POSTGRES_NETWORK 으로 override 가능.
      - postgres-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  web:
    image: ${WEB_IMAGE:-ghcr.io/jinsujj/adsignage-web:latest}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 타임에 인라인되므로 build args 로 전달.
        # 동일 호스트에 nginx 로 합쳐 배포할 거면 빈 문자열(상대 경로) 권장.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: adsignage-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      # nginx stream.owl-dev.me 가 3002 로 프록시하므로 거기 맞춤. .env 로 override 가능.
      - "${WEB_HOST_PORT:-3002}:3000"
    networks:
      - adsignage
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  adsignage:
    driver: bridge
  # postgres 컨테이너가 이미 붙어 있는 외부 network. 같은 host 에서 별도
  # docker compose 로 만든 네트워크라 external: true 로 attach 만 한다.
  postgres-net:
    external: true
    name: ${POSTGRES_NETWORK:-owl-blog-network}

volumes:
  # H2 file: jdbc:h2:file:./data/adsignage → 컨테이너 /opt/adsignage/data
  adsignage-data:
  # MP4 업로드: VIDEO_STORAGE_PATH=/var/lib/adsignage/videos
  adsignage-videos:
