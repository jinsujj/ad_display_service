# =============================================================================
# BOOTSTRAP nginx config for stream.owl-dev.me
#
# Purpose: serve plain HTTP only, just long enough for certbot to complete the
# ACME http-01 challenge and issue a Let's Encrypt certificate. Once certbot
# succeeds, replace this file with stream.owl-dev.me.conf (the full HTTPS
# reverse-proxy config).
#
# Why a bootstrap file?
#   The full config references /etc/letsencrypt/live/stream.owl-dev.me/*.pem
#   which do not exist before certbot runs, causing `nginx -t` to fail and
#   blocking the very reload that certbot needs to validate the domain.
#
# Use:
#   sudo cp deploy/nginx/stream.owl-dev.me-bootstrap.conf \
#           /etc/nginx/sites-available/stream.owl-dev.me.conf
#   sudo ln -sf /etc/nginx/sites-available/stream.owl-dev.me.conf \
#               /etc/nginx/sites-enabled/stream.owl-dev.me.conf
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot \
#        -d stream.owl-dev.me \
#        --non-interactive --agree-tos -m admin@owl-dev.me
#   # then swap in the full HTTPS config:
#   sudo cp deploy/nginx/stream.owl-dev.me.conf \
#           /etc/nginx/sites-available/stream.owl-dev.me.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen      80;
    listen      [::]:80;
    server_name stream.owl-dev.me;

    # ACME http-01 challenge files written here by certbot --webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # During bootstrap everything else just returns 503 — backend is not
    # reachable over plain HTTP yet and we do not want to redirect to a
    # broken HTTPS endpoint.
    location / {
        return 503 "stream.owl-dev.me is bootstrapping TLS\n";
        add_header Content-Type text/plain;
    }
}
