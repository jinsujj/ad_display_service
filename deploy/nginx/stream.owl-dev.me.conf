# =============================================================================
# stream.owl-dev.me — 프론트엔드 전용 (Next.js admin/player @ 127.0.0.1:3002)
# 백엔드 라우트는 stream-backend.owl-dev.me 로 분리됨.
# =============================================================================

map $http_upgrade $stream_frontend_connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen      80;
    listen      [::]:80;
    server_name stream.owl-dev.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name stream.owl-dev.me;

    ssl_certificate     /etc/letsencrypt/live/stream.owl-dev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.owl-dev.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL_FRONTEND:10m;
    ssl_session_timeout 1d;

    client_max_body_size 32m;

    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/stream.owl-dev.me.access.log;
    error_log  /var/log/nginx/stream.owl-dev.me.error.log warn;

    location / {
        proxy_pass              http://127.0.0.1:3002;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        $stream_frontend_connection_upgrade;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_connect_timeout   30s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }
}
