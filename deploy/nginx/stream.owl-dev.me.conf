# =============================================================================
# nginx reverse proxy for stream.owl-dev.me
#
# Routing (AC 12):
#   /                  -> Next.js admin web + player page on localhost:3000
#   /api/*             -> Spring Boot REST API on localhost:8080
#   /videos/*          -> Spring Boot video streaming on localhost:8080 (Range)
#   /actuator/*        -> Spring Boot health/metrics on localhost:8080
#   /api/sse/*         -> Spring Boot SSE (proxy_buffering off, 24h read timeout)
#   /api/videos/*      -> Spring Boot video streaming (Range-aware passthrough)
#
# Other behaviors:
#   - terminates TLS (Let's Encrypt) on :443
#   - 301 redirect from :80, with /.well-known/acme-challenge/ carve-out
#   - WebSocket-ready Upgrade/Connection headers (Next.js dev HMR + future WS)
#   - Range-aware: forwards Range header for HTTP video streaming
#   - Up to 512 MB advertiser MP4 uploads
#
# Install:
#   sudo cp deploy/nginx/stream.owl-dev.me.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/stream.owl-dev.me.conf \
#               /etc/nginx/sites-enabled/stream.owl-dev.me.conf
#   sudo certbot --nginx -d stream.owl-dev.me   # provisions TLS, edits this file
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ---- WebSocket upgrade map (top-level; safe if defined once globally) -------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- HTTP -> HTTPS redirect --------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name stream.owl-dev.me;

    # Allow ACME http-01 challenge for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS reverse proxy -----------------------------------------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name stream.owl-dev.me;

    # TLS (managed by certbot — these paths are populated after certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/stream.owl-dev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.owl-dev.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Allow large video uploads (advertiser MP4 uploads -> Spring Boot multipart)
    client_max_body_size      512m;
    client_body_buffer_size   1m;
    client_body_timeout       300s;

    # Security headers (PoC-grade; harmless for WebView clients)
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/stream.owl-dev.me.access.log;
    error_log  /var/log/nginx/stream.owl-dev.me.error.log warn;

    # =========================================================================
    # BACKEND ROUTES (Spring Boot @ 127.0.0.1:8080)
    # =========================================================================

    # -------------------------------------------------------------------------
    # SSE endpoint(s):
    #   /api/sse/*                            (legacy carve-out prefix)
    #   /api/devices/{deviceId}/stream        (AC 1 — DeviceStreamController)
    #   /api/devices/{deviceId}/events        (AC 5 — DeviceSseController)
    #
    # AC 10 hard requirement — "end-to-end remap reflects on player within
    # 3 seconds":
    #   - disable proxy buffering so MAPPING_CHANGED events flush immediately
    #     (default proxy_buffering=on holds bytes until a buffer fills, which
    #     reliably busts the 3s budget on idle streams)
    #   - extend read timeout (default 60s would kill the long-lived SSE
    #     stream, the player would then need to reconnect before any remap
    #     event could be observed at all)
    #   - disable HTTP/1.1 chunked re-buffering
    #
    # # Why the regex location works here
    #   The two device SSE paths are dynamic in the deviceId segment, so a
    #   plain prefix match is not enough. We use a regex location, which has
    #   higher precedence than the `/api/` plain-prefix match below — but
    #   only when no `^~` prefix matches first (nginx skips regex when an
    #   `^~` location wins). The `/api/` block deliberately does NOT use
    #   `^~` so this regex carve-out is reached for the SSE paths.
    #
    # # Why the legacy `^~ /api/sse/` is kept
    #   Backward-compat for any client still hitting `/api/sse/<id>` from a
    #   previous wire shape; harmless to keep alongside the regex match.
    # -------------------------------------------------------------------------
    location ^~ /api/sse/ {
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        # SSE essentials
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection        '';
        chunked_transfer_encoding on;
        proxy_read_timeout      24h;
        proxy_send_timeout      24h;

        # Standard forwarded headers
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;
    }

    # AC 10 — per-device SSE wires must flush immediately so MAPPING_CHANGED
    # round-trips in well under the 3 second budget. Regex match captures both
    # the AC 1 `/stream` route and the legacy AC 5 `/events` route.
    location ~ ^/api/devices/[^/]+/(stream|events)$ {
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        # SSE essentials — same shape as /api/sse/ above.
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection        '';
        chunked_transfer_encoding on;
        proxy_read_timeout      24h;
        proxy_send_timeout      24h;

        # Standard forwarded headers
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;
    }

    # -------------------------------------------------------------------------
    # Video streaming: /api/videos/*  (canonical path used by Spring Boot)
    #   - keep proxy_buffering off so Range responses pass through quickly
    #   - forward Range / If-Range so Spring Boot's Resource handler can
    #     return 206 Partial Content for <video> seek/playback.
    # -------------------------------------------------------------------------
    location ^~ /api/videos/ {
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_set_header        Range             $http_range;
        proxy_set_header        If-Range          $http_if_range;

        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    # -------------------------------------------------------------------------
    # Video streaming alias: /videos/*
    #   The seed contract calls for "/videos/{id}.mp4" Range-served URLs;
    #   Spring Boot exposes them under /api/videos/{filename}, so we rewrite
    #   /videos/<rest> -> /api/videos/<rest> on the upstream call. This keeps
    #   both URL shapes alive (Next.js player can use either) without
    #   duplicating controller code.
    # -------------------------------------------------------------------------
    location ^~ /videos/ {
        rewrite ^/videos/(.*)$ /api/videos/$1 break;
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_set_header        Range             $http_range;
        proxy_set_header        If-Range          $http_if_range;

        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    # -------------------------------------------------------------------------
    # REST API: /api/*  -> Spring Boot
    #
    # NOTE (AC 10): this block intentionally does NOT use `^~`. Nginx's
    # location resolution is "longest matching `^~` prefix wins → skip
    # regex". The regex location above (per-device SSE wires) needs to win
    # over this generic `/api/` match, so we leave `^~` off here. The more
    # specific `^~ /api/sse/`, `^~ /api/videos/`, `^~ /videos/` carve-outs
    # above still take precedence for their prefixes.
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        # WebSocket upgrade (harmless for plain HTTP requests; map sets ''/close)
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        $connection_upgrade;

        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;

        proxy_connect_timeout   30s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    # -------------------------------------------------------------------------
    # Spring Boot Actuator (health/metrics) — kept on the backend so the
    # smoke tests in deploy/scripts/verify-public-access.sh keep working.
    # -------------------------------------------------------------------------
    location ^~ /actuator/ {
        proxy_pass              http://127.0.0.1:8080;
        proxy_http_version      1.1;

        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # =========================================================================
    # FRONTEND ROUTES (Next.js admin web + /player/{deviceId}) @ 127.0.0.1:3000
    # =========================================================================

    # -------------------------------------------------------------------------
    # Catch-all: Next.js (admin pages, player page, _next static, favicon, …)
    #
    # `next start -p 3000` serves:
    #   /                              -> landing
    #   /admin/*, /devices, /videos, /ads/*, /restaurants
    #   /player/{deviceId}             -> Android WebView playback page
    #   /_next/*, /static/*, /favicon* -> built assets
    # -------------------------------------------------------------------------
    location / {
        proxy_pass              http://127.0.0.1:3000;
        proxy_http_version      1.1;

        # Next.js dev/HMR + future Server Actions / WebSocket support
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        $connection_upgrade;

        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;

        proxy_connect_timeout   30s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }
}
