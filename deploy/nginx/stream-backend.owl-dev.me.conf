# =============================================================================
# stream-backend.owl-dev.me — Spring Boot 백엔드 전용 nginx 설정
#   :443 HTTPS → 127.0.0.1:8082 (adsignage-backend.service)
#
# 라우트:
#   /api/...                      REST API
#   /api/devices/{id}/stream      SSE (proxy_buffering off, 24h timeout)
#   /api/videos/{filename}        영상 Range 스트리밍
#   /actuator/...                 헬스/메트릭
#   /v3/api-docs, /swagger-ui     OpenAPI / Swagger UI
#
# 정적 자원/프론트 페이지는 stream.owl-dev.me 가 따로 처리.
# =============================================================================

map $http_upgrade $stream_backend_connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen      80;
    listen      [::]:80;
    server_name stream-backend.owl-dev.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name stream-backend.owl-dev.me;

    ssl_certificate     /etc/letsencrypt/live/stream-backend.owl-dev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream-backend.owl-dev.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL_BACKEND:10m;
    ssl_session_timeout 1d;

    client_max_body_size      512m;
    client_body_buffer_size   1m;
    client_body_timeout       300s;

    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/stream-backend.owl-dev.me.access.log;
    error_log  /var/log/nginx/stream-backend.owl-dev.me.error.log warn;

    # SSE — per-device 즉시 푸시 (AC 10)
    location ~ ^/api/devices/[^/]+/(stream|events)$ {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection        "";
        chunked_transfer_encoding on;
        proxy_read_timeout      24h;
        proxy_send_timeout      24h;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # 영상 Range 스트리밍
    location ^~ /api/videos {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_set_header        Range             $http_range;
        proxy_set_header        If-Range          $http_if_range;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    # OpenAPI / Swagger UI
    location ^~ /v3/api-docs {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
    location ^~ /swagger-ui {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # 일반 REST API (catch-all). preflight OPTIONS도 백엔드 CORS 필터가 처리.
    location / {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        $stream_backend_connection_upgrade;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_connect_timeout   30s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }
}
