<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    AdSignage 파비콘 — Android 런처 아이콘과 동일 디자인 언어.
    어둠 베이스 + 앰버 광고판 픽토 + 송출 인디케이터 도트.
  -->
  <rect width="32" height="32" rx="6" fill="#0B0D10"/>
  <!-- 광고판 외곽 (둥근 모니터) -->
  <rect x="6" y="7" width="20" height="14" rx="2.5"
        fill="#F5B042" fill-opacity="0.18"
        stroke="#F5B042" stroke-width="1.5"/>
  <!-- 받침대 -->
  <rect x="14" y="22" width="4" height="2" fill="#F5B042"/>
  <rect x="11" y="24" width="10" height="1.5" rx="0.5" fill="#F5B042"/>
  <!-- 송출 인디케이터 (라이브 도트) -->
  <circle cx="22" cy="11" r="1.6" fill="#FFC665"/>
  <circle cx="22" cy="11" r="3" fill="#FFC665" fill-opacity="0.25"/>
</svg>
